services:
  # MySQL 数据库服务
  mysql:
    image: mysql:8.0
    container_name: nl2sql-agent-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: meta
      MYSQL_USER: atguigu
      MYSQL_PASSWORD: Atguigu.123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - nl2sql-agent-network

  # Qdrant 向量数据库
  qdrant:
    image: qdrant/qdrant:latest
    container_name: nl2sql-agent-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - nl2sql-agent-network

  # Elasticsearch 全文检索
  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: nl2sql-agent-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - nl2sql-agent-network

  # Data-Agent 应用服务
  data-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nl2sql-agent-app
    ports:
      - "8000:8000"
    environment:
      - ENV=production
      - CONFIG_PATH=/app/conf/app_config.yaml
    volumes:
      - ./conf:/app/conf:ro
      - ./prompts:/app/prompts:ro
      - ./logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      qdrant:
        condition: service_started
      elasticsearch:
        condition: service_started
    networks:
      - nl2sql-agent-network
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  mysql_data:
  qdrant_data:
  es_data:

networks:
  nl2sql-agent-network:
    driver: bridge
